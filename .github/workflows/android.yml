name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Java 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Sistem paketleri
        run: |
          sudo apt update
          sudo apt install -y zip unzip openjdk-17-jdk

      - name: Android SDK kur (FULL FIX)
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          mkdir -p $ANDROID_HOME/cmdline-tools
          cd $ANDROID_HOME

          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O tools.zip
          unzip -o tools.zip -d cmdline-tools
          mv cmdline-tools/cmdline-tools cmdline-tools/latest || true

          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH

          # 🔥 ZORLA lisans kabul (garanti)
          yes | sdkmanager --licenses || true

          # 🔥 Paketleri zorla kur
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.0"

          # 🔥 kontrol (debug için)
          sdkmanager --list

      - name: Buildozer kur
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: APK oluştur
        run: |
          buildozer android debug

      - name: APK yükle
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
