name: Ozkan_Build_Final_v1

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev openjdk-17-jdk
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer

      - name: Force Accept Android Licenses
        run: |
          # SDK Lisanslarını manuel olarak dosya sistemine yazdırıyoruz
          mkdir -p $HOME/.android
          touch $HOME/.android/repositories.cfg
          mkdir -p /home/runner/.buildozer/android/platform/android-sdk/licenses
          echo -e "8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451e44fcd78146013a5937d2b9504\n24333f8a63b6825e72157d8517bc9a0dbdb0a8f2" > /home/runner/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo -e "84831b9409646a918e30573bab4c9c91346d8abd\n50466d3a0c07589630560148345e3706a0653157" > /home/runner/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license

      - name: Build with Buildozer
        run: |
          # Buildozer'ı sessiz modda ve hata ayıklama seviyesinde başlat
          buildozer -v android debug
        env:
          ACCEPT_SDK_LICENSE: 1
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
          
