name: Ozkan_Build_Final_v1

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev \
          openjdk-17-jdk libltdl-dev libgdbm-dev libsqlite3-dev tk-dev libbz2-dev \
          python3-dev libjpeg-dev libpng-dev
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer

      - name: Manual SDK and Path Fix
        run: |
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/tools/bin
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          cp -r cmdline-tools/* $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/
          cp -r cmdline-tools/* $HOME/.buildozer/android/platform/android-sdk/tools/
          # Lisanslar
          yes | $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/.buildozer/android/platform/android-sdk --licenses

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:$HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin
          buildozer -v android debug
        env:
          ACCEPT_SDK_LICENSE: 1
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
          
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OzkanGMI_APK_Dosyasi
          path: bin/*.apk
          
