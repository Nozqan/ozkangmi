name: Ozkan_Build_Final_v1

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt update
          # libtinfo5 yerine libtinfo6 ekledik ve gereksizleri temizledik
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer

      - name: Build with Buildozer
        run: |
          # SDK lisanslarını otomatik kabul et ve derle
          yes | buildozer -v android debug
        env:
          ACCEPT_SDK_LICENSE: 1

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ozkan_App_Package
          path: bin/*.apk
          
